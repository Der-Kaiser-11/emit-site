<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel - Emit</title>

  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin: 10px auto;
      max-width: 300px;
    }

    button {
      padding: 10px 20px;
      background: red;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAL4jHz4Hj60DcDshABLdLZNBcM0G_TfUI",
      authDomain: "kairos---site.firebaseapp.com",
      projectId: "kairos---site",
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

    // 🔐 proteção
    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        carregarAgendamentos();
      }
    });

    function logout() {
      firebase.auth().signOut().then(() => {
        window.location.href = "login.html";
      });
    }

    function carregarAgendamentos() {
      const container = document.getElementById("lista");

      db.collection("agendamentos").get().then((querySnapshot) => {
        container.innerHTML = "";

        querySnapshot.forEach((doc) => {
          const ag = doc.data();

          container.innerHTML += `
            <div class="card">
              <h3>${ag.nome}</h3>
              <p>Serviço: ${ag.servico}</p>
              <p>Profissional: ${ag.profissional}</p>
              <p>Data: ${ag.data}</p>
              <p>Hora: ${ag.hora}</p>
            </div>
          `;
        });
      });
    }
  </script>
</head>

<body>

  <h1>📊 Painel Emit</h1>

  <div id="lista"></div>

  <button onclick="logout()">Sair</button>

</body>
</html>
